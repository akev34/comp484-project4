<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Timed Typing Test App</title>
    <script src="script.js" async></script>
    <link rel="stylesheet" href="//fonts.googleapis.com/css?family=Source+Sans+Pro:400,400i,700,700i,900,900i" type="text/css" media="all">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="masthead">
        <h1>Test Your Typing Speed</h1>
    </header>

    <main class="main">
        <article class="intro">
            <p>This is a typing test. Your goal is to duplicate the provided text, EXACTLY, in the field below. The timer starts when you start typing, and only stops when you match this text exactly. Good Luck!</p>
        </article>

        <section class="test-area">
            <!-- The paragraph the user has to type — gets swapped on each reset -->
            <div id="origin-text">
                <p>The text to test.</p>
            </div>

            <!-- Border color of this wrapper changes based on typing state -->
            <div class="test-wrapper">
                <textarea id="test-area" name="textarea" rows="6" placeholder="The clock starts when you start typing."></textarea>
            </div>

            <div class="meta">
                <section id="clock">
                    <div class="timer">00:00:00</div>
                </section>

                <!-- Live performance metrics -->
                <section class="metrics">
                    <div class="metric">
                        <span class="metric-label">WPM</span>
                        <span id="wpm" class="metric-value">0</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Errors</span>
                        <span id="errors" class="metric-value">0</span>
                    </div>
                </section>

                <button id="reset">Start over</button>
            </div>

            <!-- Top 3 fastest scores from localStorage -->
            <section class="leaderboard">
                <h2>Top 3 Fastest Scores</h2>
                <ol id="top-scores"></ol>
            </section>
        </section>
    </main>

</body>

</html>
